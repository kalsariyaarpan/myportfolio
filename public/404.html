<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        @keyframes pulse-custom {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        .animate-pulse-custom {
            animation: pulse-custom 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .gradient-text {
            background: linear-gradient(to right, #a855f7, #f472b6, #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center px-4">
    <div class="max-w-3xl mx-auto text-center">
        <!-- 404 Number -->
        <div class="mb-8 animate-pulse-custom">
            <h1 class="text-9xl sm:text-[150px] font-bold gradient-text">404</h1>
        </div>

        <!-- Title -->
        <h2 class="text-4xl sm:text-5xl font-bold text-white mb-4">
            Page Not Found
        </h2>

        <!-- Description -->
        <p class="text-lg sm:text-xl text-gray-400 mb-8">
            Oops! The page you're looking for doesn't exist. It might have been moved or deleted.
        </p>

        <!-- Decorative Line -->
        <div class="h-1 w-20 bg-gradient-to-r from-purple-500 to-cyan-500 mx-auto mb-8 rounded-full"></div>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center mb-16">
            <a href="/"
                class="inline-flex items-center gap-2 px-8 py-3 bg-gradient-to-r from-purple-600 to-blue-600 text-white font-semibold rounded-lg hover:shadow-lg hover:shadow-purple-500/50 transition-all duration-300 transform hover:scale-105">
                ← Back to Home
            </a>
            <a href="/#contact"
                class="inline-flex items-center gap-2 px-8 py-3 border-2 border-purple-500 text-purple-400 font-semibold rounded-lg hover:bg-purple-500/10 transition-all duration-300 transform hover:scale-105">
                Get in Touch
            </a>
        </div>

        <!-- Footer -->
        <div class="space-y-2 text-sm text-gray-500">
            <p>Error Code: 404 | Page Not Found</p>
            <p>Let's get you back on track</p>
        </div>
    </div>
</body>
</html>
